<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow,noarchive">
  <meta name="googlebot" content="noindex,nofollow,noarchive">
  <title>網站已關閉</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: "Noto Sans TC", "Microsoft JhengHei", system-ui, sans-serif;
      background: #f6f7f9;
      color: #171a1f;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      box-sizing: border-box;
    }

    main {
      max-width: 560px;
      text-align: center;
    }

    h1 {
      margin: 0 0 14px;
      font-size: clamp(32px, 6vw, 48px);
      line-height: 1.15;
      font-weight: 800;
      letter-spacing: 0;
    }

    p {
      margin: 0;
      font-size: 18px;
      line-height: 1.7;
      color: #4b5563;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        background: #101216;
        color: #f4f6f8;
      }

      p {
        color: #c6ccd5;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>網站已關閉</h1>
    <p>此論壇已停止服務，線上內容已於 2026-06-16 下架。</p>
  </main>
</body>
</html>
